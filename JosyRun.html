<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring über deine Probleme, Josy!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            
            /* HIER: Hintergrundbild für die gesamte Seite außerhalb des Spiels */
            background-image: url('Bilder/backgroundgame.avif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #333; 
        }

        h1 {
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            margin-bottom: 10px;
        }

        #game-container {
       
            width: 1000px;
            height: 500px; 
            border: 4px solid #ff69b4;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            
            /* Spiel-Hintergrundbild */
            background-image: url('Bilder/gamebackground.jpg'); 
            background-size: cover;
            background-position: bottom;
            background-color: #fff;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        #josy {
            width: 80px; /* Proportionen leicht angepasst */
            height: 80px;
            position: absolute;
            bottom: 0;
            left: 50px;
            background-image: url('Bilder/josygame.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            z-index: 10;
        }

        .hindernis {
            width: 60px;  
            height: 140px; 
            position: absolute;
            bottom: 0;
            background-image: url('Bilder/daniilgame.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            
        }

        .jump {
            /* Sprunganimation: Höher und langsamer für das größere Fenster */
            animation: jump 0.9s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        @keyframes jump {
            0% { bottom: 0; }
            40% { bottom: 280px; } /* Höherer Sprung für 500px Fensterhöhe */
            60% { bottom: 280px; } 
            100% { bottom: 0; }
        }

        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 20px;
            z-index: 100;
            border: 2px solid #ff69b4;
        }

        #score {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .back-btn {
            margin-top: 15px;
            padding: 15px 30px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.1);
            background: #ff1493;
        }
    </style>
</head>
<body>

    <h1>Spring über deine Probleme, Josy!</h1>
    
    <div id="game-container">
        <div id="josy"></div>
        <div id="ui-layer">
            <h2 id="msg">Erwischt! 😂</h2>
            <p>Klicke hier oder drücke Leertaste zum Neustarten</p>
        </div>
    </div>

    <div id="score">Score: 0</div>
    <button class="back-btn" onclick="window.location.href='HappyBirthday!.html'">Zurück zum Hauptmenü</button>

    <script>
        const josy = document.getElementById("josy");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score");
        const uiLayer = document.getElementById("ui-layer");
        
        let score = 0;
        let isGameOver = false;

        function jump() {
            if (isGameOver) {
                restartGame();
                return;
            }
            if (!josy.classList.contains("jump")) {
                josy.classList.add("jump");
                // Timeout muss zur Animationsdauer im CSS passen (900ms)
                setTimeout(() => {
                    josy.classList.remove("jump");
                }, 900);
            }
        }

        function createObstacle() {
            if (isGameOver) return;

            const obstacle = document.createElement("div");
            obstacle.classList.add("hindernis");
            obstacle.style.left = "1000px";
            container.appendChild(obstacle);

            let obstaclePos = 1000;
            
            let moveInterval = setInterval(() => {
                if (isGameOver) {
                    clearInterval(moveInterval);
                    return;
                }

                obstaclePos -= 7; 
                obstacle.style.left = obstaclePos + "px";

                // KOLLISIONSABFRAGE
                let josyBottom = parseInt(window.getComputedStyle(josy).getPropertyValue("bottom"));
                let josyLeft = 50;
                let josyRight = 50 + 50; 

                let obsLeft = obstaclePos + 20;  
                let obsRight = obstaclePos + 40; 
                let obsTop = 120; // Höhe der Hitbox 

                if (obsLeft < josyRight && obsRight > josyLeft) {
                    if (josyBottom < obsTop) {
                        gameOver();
                    }
                }

                if (obstaclePos < -100) {
                    clearInterval(moveInterval);
                    container.removeChild(obstacle);
                    if (!isGameOver) {
                        score++;
                        scoreElement.innerHTML = "Score: " + score;
                    }
                }
            }, 20);

            // Zufälliger Spawn-Zeitpunkt
            let nextSpawn = Math.random() * (2200 - 1000) + 1000;
            setTimeout(createObstacle, nextSpawn);
        }

        function gameOver() {
            isGameOver = true;
            uiLayer.style.display = "block";
        }

        function restartGame() {
            location.reload();
        }

        document.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        container.addEventListener("mousedown", jump);

        createObstacle();
    </script>
</body>
</html>
